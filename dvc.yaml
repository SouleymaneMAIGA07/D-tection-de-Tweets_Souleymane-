stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - tweets_dataset.csv
    outs:
      - data/processed/clean_dataset.csv

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/clean_dataset.csv
      - params.yaml
    params:
      - train.test_size
      - train.max_features
      - train.random_state
    outs:
      - models/model.pkl
      - models/vectorizer.pkl
      - data/processed/X_test.csv
      - data/processed/y_test.csv

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/model.pkl
      - models/vectorizer.pkl
      - data/processed/X_test.csv
      - data/processed/y_test.csv
    metrics:
      - metrics/scores.json:
          cache: false
